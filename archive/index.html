<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script>
    /* js gate + hard failsafe: if GSAP/JS ever dies, the archive still shows. */
    (function () {
      var d = document.documentElement;
      d.classList.remove("no-js");
      d.classList.add("js");
      window.__archiveFailsafe = setTimeout(function () {
        if (!window.__archiveReady) d.classList.add("archive-failsafe");
      }, 7000);
      window.addEventListener("error", function () {
        if (!window.__archiveReady) d.classList.add("archive-failsafe");
      });
    })();
  </script>
  <title>Photography Archive — Dhrumil Kadchha</title>
  <meta name="description" content="An immersive digital exhibition of photographic work by Dhrumil Kadchha. Five ways to wander the archive." />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
  <link rel="apple-touch-icon" href="/favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=3" />
  <link rel="stylesheet" href="/archive/css/archive.css?v=3" />
  <noscript><style>.archive-entrance { display: none; } .mode-selector, .archive-counter { opacity: 1 !important; transform: none !important; }</style></noscript>
</head>
<body>

  <!-- Entrance -->
  <div class="archive-entrance" id="archiveEntrance">
    <div class="archive-entrance__panel archive-entrance__panel--top"></div>
    <div class="archive-entrance__panel archive-entrance__panel--bottom"></div>
    <div class="archive-entrance__label mono">LOADING EXHIBITION</div>
    <div class="archive-entrance__bar"><i id="entranceBar"></i></div>
    <div class="archive-entrance__count mono" id="entranceCount">00 / 60</div>
  </div>

  <!-- Wipe (archive → home) -->
  <div class="wipe" id="wipe" aria-hidden="true">
    <div class="wipe__panel wipe__panel--top"></div>
    <div class="wipe__panel wipe__panel--bottom"></div>
    <div class="wipe__label">PORTFOLIO</div>
  </div>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor" aria-hidden="true">
    <div class="cursor__dot"></div>
    <div class="cursor__label"><span id="cursorLabel">VIEW</span></div>
  </div>

  <!-- Header -->
  <header class="archive-header" id="archiveHeader">
    <a href="/" class="archive-header__logo" data-hover aria-label="Back to Home">DK<i>.</i></a>
    <div class="archive-header__center mono">EXHIBITION — <em id="headerMode">FLOW</em></div>
    <a href="/" class="archive-header__close mono" data-hover>
      <span>CLOSE</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
    </a>
  </header>

  <!-- Mode Selector -->
  <nav class="mode-selector" id="modeSelector" aria-label="View modes">
    <div class="mode-selector__pill">
      <button class="mode-btn is-active" data-mode="vertical" aria-label="Flow — vertical masonry" aria-pressed="true">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="6" height="8" rx="1"/><rect x="12" y="2" width="6" height="5" rx="1"/><rect x="2" y="13" width="6" height="5" rx="1"/><rect x="12" y="10" width="6" height="8" rx="1"/></svg>
        <span class="mode-btn__label mono">FLOW</span>
      </button>
      <button class="mode-btn" data-mode="horizontal" aria-label="Reel — horizontal gallery" aria-pressed="false">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="5" width="5" height="10" rx="1"/><rect x="7.5" y="5" width="5" height="10" rx="1"/><rect x="14" y="5" width="5" height="10" rx="1"/></svg>
        <span class="mode-btn__label mono">REEL</span>
      </button>

      <button class="mode-btn" data-mode="circular" aria-label="Orbit — circular wheel" aria-pressed="false">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/><circle cx="10" cy="10" r="2"/></svg>
        <span class="mode-btn__label mono">ORBIT</span>
      </button>
      <button class="mode-btn" data-mode="floating" aria-label="Scatter — floating canvas" aria-pressed="false">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="5" height="4" rx="1" transform="rotate(-8 3.5 5)"/><rect x="11" y="1" width="6" height="5" rx="1" transform="rotate(5 14 3.5)"/><rect x="3" y="12" width="5" height="6" rx="1" transform="rotate(6 5.5 15)"/><rect x="13" y="13" width="5" height="4" rx="1" transform="rotate(-4 15.5 15)"/></svg>
        <span class="mode-btn__label mono">SCATTER</span>
      </button>
    </div>
  </nav>

  <!-- HUD -->
  <div class="archive-counter mono" id="archiveCounter">
    <span id="counterCurrent">01</span> / <span id="counterTotal">60</span>
  </div>
  <div class="gallery-hint mono" id="galleryHint"></div>
  <div class="zoom-hud" id="zoomHud" aria-hidden="true">
    <button id="zoomOut" aria-label="Zoom out">−</button>
    <span class="zoom-hud__val" id="zoomVal">100%</span>
    <button id="zoomIn" aria-label="Zoom in">+</button>
  </div>
  <div class="orbit-caption" id="orbitCaption" aria-hidden="true">
    <div class="orbit-caption__title" id="orbitCaptionTitle"></div>
    <div class="orbit-caption__meta mono" id="orbitCaptionMeta"></div>
  </div>

  <main class="archive-main" id="archiveMain">
    <section class="gallery" id="gallery" data-mode="vertical" aria-label="Photography archive">
      <div class="orbit-ring" id="orbitRing" aria-hidden="true"></div>
      <div class="gallery__wrapper" id="galleryWrapper">
        <!-- items injected from /data/images.json -->
      </div>
    </section>
  </main>

  <!-- Fullscreen viewer (namespaced .xlb — never collides with the homepage lightbox) -->
  <div class="xlb" id="xlb" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <div class="xlb__bg" id="xlbBg"></div>
    <div class="xlb__content">
      <div class="xlb__header">
        <div class="xlb__meta">
          <div class="xlb__title" id="xlbTitle"></div>
          <div class="xlb__info mono" id="xlbInfo"></div>
        </div>
        <button class="xlb__close mono" id="xlbClose" data-hover>
          CLOSE
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
        </button>
      </div>
      <div class="xlb__stage" id="xlbStage">
        <img src="" id="xlbImg" alt="" />
      </div>
      <button class="xlb__arrow xlb__arrow--prev" id="xlbPrev" aria-label="Previous photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="xlb__arrow xlb__arrow--next" id="xlbNext" aria-label="Next photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div class="xlb__counter mono" id="xlbCounter"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="/archive/js/archive.js?v=3"></script>
</body>
</html>
